<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StoryStream AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Heebo: Hebrew body · Plus Jakarta Sans: UI elements (characterful, not generic Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      /* ── Design Tokens ─────────────────────────────────────────────── */
      :root {
        --color-bg:         #030712;
        --color-surface:    #0f172a;
        --color-surface-2:  #1e293b;
        --color-border:     #1e293b;
        --color-border-2:   #334155;
        --color-text:       #f1f5f9;
        --color-text-muted: #94a3b8;
        --color-accent:     #6366f1;
        --color-accent-glow:rgba(99,102,241,0.25);
        --color-gold:       #f59e0b;
        --radius-card:      1rem;
        --transition-fast:  150ms cubic-bezier(.4,0,.2,1);
        --transition-med:   300ms cubic-bezier(.4,0,.2,1);
      }

      /* ── Base ──────────────────────────────────────────────────────── */
      * { box-sizing: border-box; }

      body {
        font-family: 'Plus Jakarta Sans', 'Heebo', system-ui, sans-serif;
        background: var(--color-bg);
        color: var(--color-text);
        -webkit-font-smoothing: antialiased;
      }

      /* Hebrew content renders with Heebo */
      :lang(he), [dir="rtl"] body {
        font-family: 'Heebo', 'Plus Jakarta Sans', system-ui, sans-serif;
      }

      /* ── Scrollbar ─────────────────────────────────────────────────── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--color-surface); }
      ::-webkit-scrollbar-thumb {
        background: var(--color-border-2);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }

      /* ── Animations ────────────────────────────────────────────────── */
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes slide-in-right {
        from { opacity: 0; transform: translateX(32px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes slide-in-left {
        from { opacity: 0; transform: translateX(-32px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 0 0 var(--color-accent-glow); }
        50%       { box-shadow: 0 0 0 8px transparent; }
      }
      @keyframes shimmer {
        from { background-position: -200% center; }
        to   { background-position:  200% center; }
      }

      .animate-fade-up   { animation: fade-up   .4s var(--transition-med) both; }
      .animate-fade-in   { animation: fade-in   .3s var(--transition-fast) both; }
      .animate-slide-right { animation: slide-in-right .35s ease both; }
      .animate-slide-left  { animation: slide-in-left  .35s ease both; }

      /* Staggered children */
      .stagger-children > * { animation: fade-up .4s ease both; }
      .stagger-children > *:nth-child(1) { animation-delay: .05s; }
      .stagger-children > *:nth-child(2) { animation-delay: .10s; }
      .stagger-children > *:nth-child(3) { animation-delay: .15s; }
      .stagger-children > *:nth-child(4) { animation-delay: .20s; }
      .stagger-children > *:nth-child(5) { animation-delay: .25s; }
      .stagger-children > *:nth-child(6) { animation-delay: .30s; }

      /* Ambient glow behind the header logo */
      .logo-glow {
        position: relative;
      }
      .logo-glow::before {
        content: '';
        position: absolute;
        inset: -8px;
        background: radial-gradient(circle, var(--color-accent-glow) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
      }

      /* Skeleton loading shimmer */
      .skeleton {
        background: linear-gradient(90deg, var(--color-surface-2) 25%, #2d3f57 50%, var(--color-surface-2) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite linear;
        border-radius: 6px;
      }

      /* Button press micro-interaction */
      button:active:not(:disabled) { transform: scale(0.97); }

      /* Card hover lift */
      .card-hover {
        transition: transform var(--transition-med), box-shadow var(--transition-med);
      }
      .card-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px -8px rgba(0,0,0,.6);
      }

      /* Glowing accent border on focus-within for inputs */
      .input-group:focus-within {
        outline: 2px solid var(--color-accent);
        outline-offset: 2px;
        border-radius: var(--radius-card);
      }

      /* Noise texture overlay for depth */
      .noise-overlay::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='.035'/%3E%3C/svg%3E");
        pointer-events: none;
        border-radius: inherit;
        z-index: 0;
      }
    </style>
</head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
